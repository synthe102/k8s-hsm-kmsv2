# Ansible inventory for Kubernetes control-plane nodes.
# Adjust ansible_host, ansible_user, and ansible_ssh_private_key_file for your environment.
# Use ansible-vault to encrypt sensitive values (see group_vars/control_plane/vault.yml.example).

[control_plane]
cp-node-1 ansible_host=192.0.2.10
cp-node-2 ansible_host=192.0.2.11
cp-node-3 ansible_host=192.0.2.12

[control_plane:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/my-key
