# Kubernetes API-server encryption-at-rest configuration.
# Place this file on each control-plane node and reference it via:
#   --encryption-provider-config=/etc/kubernetes/enc/encryption-config.yaml
# on the kube-apiserver command line.
apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
  - resources:
      - secrets
    providers:
      - kms:
          apiVersion: v2
          name: hsm-kms-plugin
          endpoint: unix:///run/kms-plugin/kms-plugin.sock
          timeout: 3s
      # Allow reading unencrypted data written before encryption was enabled.
      - identity: {}
